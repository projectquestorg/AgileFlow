# Core plugin — essential AgileFlow workflow.
# Always enabled; cannot be disabled.
# Phase 4: skills land here. Epic / Status / Babysit skills follow.
id: core
name: Core
description: Epic, Story, Status, Babysit — essential agile workflow.
version: 1.0.0
enabledByDefault: true
cannotDisable: true

depends: []

provides:
  commands: []
  skills:
    - id: agileflow-story-writer
      dir: skills/agileflow-story-writer
  agents: []
  hooks:
    - id: session-welcome
      event: SessionStart
      script: hooks/session-welcome.js
      timeout: 5000
      skipOnError: true
  templates: []
