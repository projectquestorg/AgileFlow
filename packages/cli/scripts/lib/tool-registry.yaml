    requires_auth: true

  - name: list_issues
    description: List Linear issues with filters
    keywords: [tickets, issues, tasks, linear, backlog, sprint]
    cost: low
    requires_auth: true

  - name: update_issue
    description: Update a Linear issue status or details
    keywords: [update, ticket, status, assign, linear]
    cost: low
    requires_auth: true
